<!DOCTYPE html>
<html lang="ko">
<head>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#16a34a">

  <style>
    :root{
      --green:#16a34a;--green-dark:#15803d;--green-light:#dcfce7;
      --red:#ef4444;--orange:#f59e0b;--blue:#3b82f6;--purple:#8b5cf6;
      --gray:#6b7280;--gray-light:#f3f4f6;--border:#e5e7eb;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Pretendard','Apple SD Gothic Neo',sans-serif;background:#f9fafb;min-height:100vh;color:#111;}

    .header{background:#fff;border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10;}
    .logo-icon{width:36px;height:36px;background:#f59e0b;border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.2rem;}
    .header-title{font-size:1rem;font-weight:800;}
    .header-sub{font-size:.7rem;color:var(--gray);}
    .back-btn{padding:6px 12px;background:var(--gray-light);border:none;border-radius:6px;font-size:.8rem;font-weight:600;cursor:pointer;}

    .container{max-width:900px;margin:0 auto;padding:20px;}

    .card{background:#fff;border-radius:14px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.04);margin-bottom:16px;}
    .card-title{font-size:1rem;font-weight:800;margin-bottom:14px;display:flex;align-items:center;gap:8px;}

    .info-banner{padding:14px 16px;background:#dbeafe;border:1px solid #bfdbfe;color:#1e40af;border-radius:10px;margin-bottom:16px;font-size:.85rem;line-height:1.6;}

    .template-list{display:grid;gap:14px;}
    .template-item{padding:14px 16px;border:1.5px solid var(--border);border-radius:10px;}
    .template-item.disabled{opacity:.55;}
    .template-item-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:10px;}
    .template-name{font-weight:800;font-size:1rem;display:flex;align-items:center;gap:8px;}
    .template-detail{font-size:.78rem;color:var(--gray);margin-top:3px;}
    .template-amount{font-size:1.1rem;font-weight:800;color:#111;}
    .template-amount.salary{color:var(--green-dark);}
    .template-amount.cost{color:var(--red);}

    .template-actions{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-top:8px;}
    .template-meta{font-size:.75rem;color:var(--gray);padding:3px 8px;background:var(--gray-light);border-radius:5px;}
    .template-meta.company{color:#1e40af;background:#dbeafe;font-weight:700;}

    .btn{padding:8px 14px;border:none;border-radius:7px;font-size:.82rem;font-weight:700;cursor:pointer;}
    .btn-primary{background:var(--green);color:#fff;}
    .btn-primary:hover{opacity:.9;}
    .btn-primary:disabled{opacity:.5;cursor:not-allowed;}
    .btn-secondary{background:var(--gray-light);color:#374151;}
    .btn-secondary:hover{background:var(--border);}
    .btn-warn{background:var(--orange);color:#fff;}
    .btn-toggle{padding:4px 10px;font-size:.72rem;border-radius:5px;}
    .btn-toggle.on{background:var(--green);color:#fff;}
    .btn-toggle.off{background:var(--gray-light);color:var(--gray);}

    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:50;padding:14px;}
    .modal-overlay.show{display:flex;}
    .modal{background:#fff;border-radius:14px;padding:20px;max-width:480px;width:100%;max-height:90vh;overflow-y:auto;}
    .modal-title{font-size:1.05rem;font-weight:800;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;}
    .modal-close{background:none;border:none;font-size:1.3rem;cursor:pointer;color:var(--gray);}

    .field{margin-bottom:12px;}
    .field label{display:block;font-size:.78rem;font-weight:700;color:#374151;margin-bottom:4px;}
    .field input,.field select,.field textarea{
      width:100%;padding:9px 11px;border:1.5px solid var(--border);border-radius:7px;font-size:.9rem;

    .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

    .toast.show{opacity:1;}
    .toast.error{background:var(--red);}
    .toast.success{background:var(--green);}

    .hidden{display:none !important;}

function showToast(msg, type){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + (type || '');
  setTimeout(()=>t.classList.remove('show'), 2400);
}

function escapeHtml(s){
  if(s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function jsAttr(v){
  return JSON.stringify(v == null ? '' : v).replace(/"/g,'&quot;');
}

function fmt(n){ return (n || 0).toLocaleString('ko-KR'); }

// ============ 날짜 헬퍼 ============
function isHoliday(date){
  // 토요일(6) 또는 일요일(0)
  const d = new Date(date);
  const dow = d.getDay();
  return dow === 0 || dow === 6;
  // TODO: 공휴일 처리 (필요시 KO 공휴일 데이터 추가)
}

function adjustForHoliday(year, month, day, rule){
  // year, month, day → 휴일 조정된 날짜
  let d = new Date(year, month - 1, day);
  while(isHoliday(d)){
    if(rule === 'before') d.setDate(d.getDate() - 1);
    else if(rule === 'after') d.setDate(d.getDate() + 1);
    else break;
  }
  return d;
}

function getLastDayOfMonth(year, month){
  return new Date(year, month, 0).getDate();
}

function calcExecuteDate(template, year, month){
  const sch = template.schedule || {};
  if(sch.type === 'monthly_day'){
    const day = Math.min(sch.day || 1, getLastDayOfMonth(year, month));
    const adjusted = adjustForHoliday(year, month, day, sch.holidayRule || 'after');
    return adjusted;
  } else if(sch.type === 'monthly_last'){
    const lastDay = getLastDayOfMonth(year, month);
    const adjusted = adjustForHoliday(year, month, lastDay, sch.holidayRule || 'before');
    return adjusted;
  }
  return new Date(year, month - 1, 1);
}

function formatDate(d){
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

  try{
    const snap = await get(ref(db, 'tax_helper/templates'));
    if(snap.exists()){
      templates = snap.val();
    } else {
      // 처음 로드: 기본 템플릿 저장
      templates = JSON.parse(JSON.stringify(DEFAULT_TEMPLATES));
      await set(ref(db, 'tax_helper/templates'), templates);
    }
    renderList();
  }catch(e){
    console.error('템플릿 로드 실패:', e);
    showToast('템플릿 로드 실패: ' + e.message, 'error');
  }
}

function renderList(){
  const list = document.getElementById('templateList');
  const items = Object.values(templates).sort((a, b) => (a.order || 99) - (b.order || 99));
  if(items.length === 0){
    list.innerHTML = '<div style="padding:30px;text-align:center;color:#6b7280;">템플릿이 없습니다</div>';
    return;
  }

  list.innerHTML = items.map(t => {
    const isCost = (t.category === '03' || t.category === '04');
    const schText = t.schedule.type === 'monthly_last' 
      ? `매달 말일 (${t.schedule.holidayRule === 'before' ? '주말이면 전 영업일' : '주말이면 다음 영업일'})`
      : `매달 ${t.schedule.day}일 (${t.schedule.holidayRule === 'before' ? '주말이면 전날' : '주말이면 다음날'})`;
    return `
      <div class="template-item ${t.enabled ? '' : 'disabled'}">
        <div class="template-item-head">
          <div>
            <div class="template-name">${escapeHtml(t.icon || '📌')} ${escapeHtml(t.name)}</div>
            <div class="template-detail">${escapeHtml(schText)}</div>
          </div>
          <div class="template-amount ${isCost ? 'cost' : 'salary'}">${fmt(t.amount)}원</div>
        </div>
        <div class="template-actions">
          <span class="template-meta company">${escapeHtml(t.company)}</span>
          <span class="template-meta">${escapeHtml(t.summary)}</span>
          ${t.vatIncluded ? '<span class="template-meta">부가세 포함</span>' : ''}
          <button class="btn-toggle ${t.enabled ? 'on' : 'off'}" onclick="toggleEnabled(${jsAttr(t.id)})">${t.enabled ? '활성' : '비활성'}</button>
          <button class="btn btn-secondary" onclick="editTemplate(${jsAttr(t.id)})">✏️ 편집</button>
        </div>
      </div>`;
  }).join('');
}

window.toggleEnabled = async (id) => {
  const t = templates[id];
  if(!t) return;
  try{
    await update(ref(db, 'tax_helper/templates/' + id), { enabled: !t.enabled });
    t.enabled = !t.enabled;
    renderList();
    showToast(`${t.enabled ? '✅ 활성화' : '🔕 비활성화'}`, 'success');
  }catch(e){
    showToast('변경 실패: ' + e.message, 'error');
  }
};

          <option value="08" ${t.category==='08'?'selected':''}>08_기타</option>
        </select>
      </div>
      <div class="field">
        <label>금액 (원)</label>
        <input type="text" id="editAmount" value="${fmt(t.amount)}" ${isInsurance?'readonly style="background:#f9fafb;"':''} oninput="this.value=Number(this.value.replace(/[^0-9]/g,'')||0).toLocaleString('ko-KR');">
      </div>
    </div>

    ${extraHtml}

    <div class="field">
      <label>거래처</label>
      <input type="text" id="editVendor" value="${escapeHtml(t.vendor || '')}">
    </div>

    <div class="field">
      <label>적요</label>
      <input type="text" id="editSummary" value="${escapeHtml(t.summary || '')}">
    </div>

    <div class="field">
      <label style="display:flex;align-items:center;gap:6px;">
        <input type="checkbox" id="editVatIncluded" ${t.vatIncluded?'checked':''}>
        부가세 포함
      </label>
    </div>

    <div class="row2">
      <div class="field">
        <label>실행 시점</label>
        <select id="editScheduleType">
          <option value="monthly_day" ${t.schedule.type==='monthly_day'?'selected':''}>매달 특정 일</option>
          <option value="monthly_last" ${t.schedule.type==='monthly_last'?'selected':''}>매달 말일</option>
        </select>
      </div>
      <div class="field">
        <label>날짜 (말일이면 무시)</label>
        <input type="number" id="editScheduleDay" min="1" max="31" value="${t.schedule.day || 1}">
      </div>
    </div>

    <div class="field">
      <label>휴일/주말 처리</label>
      <select id="editHolidayRule">
        <option value="before" ${t.schedule.holidayRule==='before'?'selected':''}>전 영업일로 이동</option>
        <option value="after" ${t.schedule.holidayRule==='after'?'selected':''}>다음 영업일로 이동</option>
      </select>
    </div>

    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">취소</button>
      <button class="btn btn-primary" onclick="saveEdit(${jsAttr(t.id)})">💾 저장</button>
    </div>
  `;
  document.getElementById('editModal').classList.add('show');
};

window.onInsuranceInput = (input) => {
  let v = parseInt(input.value.replace(/[^0-9]/g, ''), 10) || 0;
  input.value = fmt(v);
  // 합계 자동 계산
  const ids = ['bd_pension','bd_health','bd_employment','bd_industrial'];
  let total = 0;
  ids.forEach(id => {
    const el = document.getElementById(id);
    if(el) total += parseInt(el.value.replace(/[^0-9]/g, ''), 10) || 0;
  });
  const totalEl = document.getElementById('bd_total');
  const amtEl = document.getElementById('editAmount');
  if(totalEl) totalEl.textContent = fmt(total);
  if(amtEl) amtEl.value = fmt(total);
};

window.closeModal = () => {
  document.getElementById('editModal').classList.remove('show');
};

document.getElementById('editModal').addEventListener('click', e => {
  if(e.target.id === 'editModal') closeModal();
});

window.saveEdit = async (id) => {
  const t = templates[id];
  if(!t) return;

  const name = document.getElementById('editName').value.trim();
  const company = document.getElementById('editCompany').value;
  const category = document.getElementById('editCategory').value;
  const amount = parseInt(document.getElementById('editAmount').value.replace(/[^0-9]/g, ''), 10) || 0;
  const vendor = document.getElementById('editVendor').value.trim();
  const summary = document.getElementById('editSummary').value.trim();
  const vatIncluded = document.getElementById('editVatIncluded').checked;
  const schedType = document.getElementById('editScheduleType').value;
  const schedDay = parseInt(document.getElementById('editScheduleDay').value, 10) || 1;
  const holidayRule = document.getElementById('editHolidayRule').value;

  if(!name || !amount){ showToast('이름과 금액은 필수', 'error'); return; }

  const updated = {
    ...t,
    name, company, category, amount,
    vendor: vendor || null,
    summary: summary || null,
    vatIncluded,
    schedule: { type: schedType, day: schedDay, holidayRule }
  };

  // 4대보험 세부 항목 저장
  if(id === 'insurance_4'){
    updated.breakdown = {
      pension: parseInt((document.getElementById('bd_pension').value||'0').replace(/[^0-9]/g, ''), 10) || 0,
      health: parseInt((document.getElementById('bd_health').value||'0').replace(/[^0-9]/g, ''), 10) || 0,
      employment: parseInt((document.getElementById('bd_employment').value||'0').replace(/[^0-9]/g, ''), 10) || 0,
      industrial: parseInt((document.getElementById('bd_industrial').value||'0').replace(/[^0-9]/g, ''), 10) || 0
    };
  }

  try{
    await set(ref(db, 'tax_helper/templates/' + id), updated);
    templates[id] = updated;
    closeModal();
    renderList();
    showToast('✅ 저장 완료', 'success');
  }catch(e){
    showToast('저장 실패: ' + e.message, 'error');
  }
};

// ============ 거래 생성 (자동) ============
async function loadExistingByTemplate(){
  const snap = await get(ref(db, 'tax_helper/transactions'));
  const map = {};
  if(snap.exists()){
    const all = snap.val();
    for(const [id, t] of Object.entries(all)){
      if(t.sourceSystem === 'template' && t.sourceId){
        map[t.sourceId] = { id, ...t };
      }
    }
  }
  return map;
}

function logProgress(text, type){
  const log = document.getElementById('progressLog');
  const div = document.createElement('div');
  div.className = 'log-item ' + (type || '');
  div.textContent = text;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}

async function executeGenerate(dryRun, targetYear, targetMonth){
  const log = document.getElementById('progressLog');
  log.classList.remove('hidden');
  log.innerHTML = '';

  const useOverride = document.getElementById('overrideDates').checked;
  const existing = await loadExistingByTemplate();
  logProgress(`▶ ${targetYear}년 ${targetMonth}월 거래 생성 ${dryRun?'시뮬레이션':'실행'}`, 'info');
  if(useOverride) logProgress('📌 개별 날짜 지정 모드', 'info');
  logProgress(`기존 템플릿 거래: ${Object.keys(existing).length}건`, 'info');
  logProgress('━━━━━━━━━━━━━━━━━━━━━━━', 'info');

  let created = 0, skipped = 0, errors = 0;
  const items = Object.values(templates).filter(t => t.enabled).sort((a,b)=>(a.order||99)-(b.order||99));

  for(const t of items){
    try{
      // 오버라이드 날짜 vs 자동 계산
      let date;
      if(useOverride){
        const ovEl = document.getElementById('ovd_' + t.id);
        if(ovEl && ovEl.value){
          date = new Date(ovEl.value);
          if(isNaN(date.getTime())){
            date = calcExecuteDate(t, targetYear, targetMonth);
          }
        } else {
          date = calcExecuteDate(t, targetYear, targetMonth);
        }
      } else {
        date = calcExecuteDate(t, targetYear, targetMonth);
      }
      const dateStr = formatDate(date);
      const sourceId = `tpl_${t.id}_${targetYear}_${String(targetMonth).padStart(2,'0')}`;

      if(existing[sourceId]){
        logProgress(`  ⏭️ 스킵: ${t.name} (이미 생성됨)`, 'info');
        skipped++;
        continue;
      }

      const supplyAmount = t.vatIncluded ? Math.round(t.amount / 1.1) : t.amount;
      const vatAmount = t.vatIncluded ? (t.amount - supplyAmount) : 0;

      const txData = {
        sourceSystem: 'template',
        sourceType: 'recurring',
        sourceId,
        templateId: t.id,
        date: dateStr,
        month: `${targetYear}_${String(targetMonth).padStart(2,'0')}`,
        company: t.company,
        category: t.category,
        txType: t.txType,
        amount: t.amount,
        vatIncluded: t.vatIncluded || false,
        supplyAmount,
        vatAmount,
        vendor: t.vendor || null,
        summary: t.summary || t.name,
        payment: t.payment || 'transfer',
        memo: null,
        attachments: []
      };
      if(t.breakdown){
        txData.breakdown = t.breakdown;
      }

      if(!dryRun){
        const newRef = push(ref(db, 'tax_helper/transactions'));
        txData.id = newRef.key;
        txData.createdAt = Date.now();
        txData.createdBy = 'system_template';
        txData.createdByName = '반복 거래 자동 생성';
        await set(newRef, txData);
      }
      created++;
      logProgress(`  ✅ ${dryRun?'생성 예정':'생성됨'}: ${t.name} - ${dateStr} - ${fmt(t.amount)}원`, 'done');
    }catch(e){
      console.error(e);
      errors++;
      logProgress(`  ❌ 실패: ${t.name} (${e.message})`, 'error');
    }
  }

  logProgress('━━━━━━━━━━━━━━━━━━━━━━━', 'info');
  logProgress(`🎉 완료: 생성 ${created} / 스킵 ${skipped} / 에러 ${errors}`, 'done');

  if(!dryRun && created > 0){
    try{
      const auditRef = push(ref(db, 'tax_helper/audit'));
      await set(auditRef, {
        action: 'template_generate',
        user: sess.email,
        timestamp: Date.now(),
        details: `${targetYear}-${targetMonth} 반복거래: 생성 ${created}건` + (useOverride ? ' (날짜 개별 지정)' : '')
      });
    }catch(e){}
  }

  showToast(`${dryRun?'시뮬레이션':'생성'} 완료: ${created}건`, 'success');
}

window.doSimulate = () => {
  const { year, month } = getTargetYM();
  executeGenerate(true, year, month);
};

window.doGenerate = () => {
  const { year, month } = getTargetYM();
  if(!confirm(`${year}년 ${month}월 반복 거래를 자동 생성합니다.\n계속할까요?`)) return;
  executeGenerate(false, year, month);
};

function initTargetSelectors(){
  const now = new Date();
  const curYear = now.getFullYear();
  const curMonth = now.getMonth() + 1;

  // 년도: 작년 ~ 다음년도
  const yearSel = document.getElementById('targetYear');
  yearSel.innerHTML = '';
  for(let y = curYear - 1; y <= curYear + 1; y++){
    const opt = document.createElement('option');
    opt.value = y;
    opt.textContent = y + '년';
    if(y === curYear) opt.selected = true;
    yearSel.appendChild(opt);
  }

  // 월: 1~12
  const monthSel = document.getElementById('targetMonth');
  monthSel.innerHTML = '';
  for(let m = 1; m <= 12; m++){
    const opt = document.createElement('option');
    opt.value = m;
    opt.textContent = m + '월';
    if(m === curMonth) opt.selected = true;
    monthSel.appendChild(opt);
  }

  yearSel.addEventListener('change', updateDatePreview);
  monthSel.addEventListener('change', updateDatePreview);

  document.getElementById('overrideDates').addEventListener('change', function(){
    document.getElementById('overrideArea').style.display = this.checked ? 'block' : 'none';
    if(this.checked) renderOverrideList();
  });
}

function getTargetYM(){
  const y = parseInt(document.getElementById('targetYear').value, 10);
  const m = parseInt(document.getElementById('targetMonth').value, 10);
  return { year: y, month: m };
}

function updateDatePreview(){
  if(!templates || Object.keys(templates).length === 0) return;
  const { year, month } = getTargetYM();
  const enabled = Object.values(templates).filter(t => t.enabled).sort((a,b)=>(a.order||99)-(b.order||99));
  const preview = enabled.map(t => {
    const d = calcExecuteDate(t, year, month);
    return `<div style="display:flex;justify-content:space-between;padding:2px 0;">
      <span>${escapeHtml(t.icon||'📌')} ${escapeHtml(t.name)}</span>
      <span style="font-family:monospace;font-weight:700;">${formatDate(d)}</span>
    </div>`;
  }).join('');
  document.getElementById('datePreview').innerHTML = preview || '활성화된 템플릿이 없습니다';
  
  // 오버라이드 영역도 다시 렌더링
  if(document.getElementById('overrideDates').checked){
    renderOverrideList();
  }
}

function renderOverrideList(){
  if(!templates || Object.keys(templates).length === 0) return;
  const { year, month } = getTargetYM();
  const enabled = Object.values(templates).filter(t => t.enabled).sort((a,b)=>(a.order||99)-(b.order||99));
  const list = document.getElementById('overrideList');
  list.innerHTML = enabled.map(t => {
    const d = calcExecuteDate(t, year, month);
    const dateStr = formatDateInput(d);
    return `<div style="display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;padding:6px 0;border-bottom:1px solid #e5e7eb;">
      <span style="font-size:.82rem;">${escapeHtml(t.icon||'📌')} ${escapeHtml(t.name)}</span>
      <input type="date" id="ovd_${escapeHtml(t.id)}" value="${dateStr}" style="padding:5px 8px;border:1.5px solid #e5e7eb;border-radius:6px;font-size:.82rem;font-family:inherit;">
    </div>`;
  }).join('');
}

function formatDateInput(d){
  // for <input type="date">
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

// 시작
onAuthStateChanged(auth, async user => {
  if(!user){
    alert('세션 만료. 다시 로그인해주세요.');
    location.replace('index.html');
    return;
  }
  initTargetSelectors();
  await loadTemplates();
  updateDatePreview();
});
